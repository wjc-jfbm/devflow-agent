name: CI — Build & Test

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - '.idea/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - '.idea/**'
  workflow_dispatch:

jobs:
  build:
    name: Build (Java 17)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: devflow123
          MYSQL_DATABASE: devflow_agent
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Run tests (core only, skip integration tests)
        run: mvn test -pl devflow-agent-core -Dtest='!com.devflow.api.**' -am
        env:
          # 单元测试 mock 了 AI 模型，不需要真实 Key
          OPENAI_API_KEY: sk-ci-dummy-key-not-used-by-unit-tests
          DB_URL: jdbc:mysql://localhost:3306/devflow_agent?useSSL=false&allowPublicKeyRetrieval=true
          DB_USERNAME: root
          DB_PASSWORD: devflow123

      - name: Package (verify assembly)
        run: mvn package -DskipTests -pl devflow-agent-api -am -q

  lint:
    name: Lint (Shell + YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
        continue-on-error: true
