# ============================================
# DevFlow Agent — 生产环境配置
# 启动方式: java -jar app.jar --spring.profiles.active=prod
# 所有敏感信息通过环境变量注入，严禁在此文件中硬编码
# ============================================

server:
  port: ${SERVER_PORT:8080}

# Actuator — 生产环境只暴露 health，metrics 通过 Prometheus 抓取
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000
      max-lifetime: 1200000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 5000

# MyBatis-Plus — 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# LangChain4j
langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY}
    base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
    model-name: ${OPENAI_MODEL:deepseek-chat}
    temperature: 0.1
    max-tokens: 4096
    timeout: 180s

# GitHub
github:
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET}
  token: ${GITHUB_TOKEN:}

# DevFlow
devflow:
  workspace:
    base-path: /data/devflow/workspace
  approval:
    enabled: true
    phases: ARCHITECT,REVIEW
  agent:
    max-retries: 2
    parallel-review: true
  auth:
    admin-password: ${DEVFLOW_ADMIN_PASSWORD}
    operator-password: ${DEVFLOW_OPERATOR_PASSWORD}

logging:
  level:
    com.devflow: INFO
    dev.langchain4j: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    path: /data/devflow/logs
    max-size: 100MB
    max-history: 30
