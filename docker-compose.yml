services:
  mysql:
    image: mysql:8.0
    container_name: devflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: devflow123
      MYSQL_DATABASE: devflow_agent
      MYSQL_USER: devflow
      MYSQL_PASSWORD: devflow123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "devflow", "-pdevflow123"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: devflow-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-devflow123} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devflow123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: devflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: devflow
      RABBITMQ_DEFAULT_PASS: devflow123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: devflow-pgvector
    environment:
      POSTGRES_DB: devflow_vectors
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow123
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: devflow-app
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com}
      - OPENAI_MODEL=${OPENAI_MODEL:-deepseek-chat}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - DEVFLOW_ADMIN_PASSWORD=${DEVFLOW_ADMIN_PASSWORD:-devflow2024}
      - DEVFLOW_OPERATOR_PASSWORD=${DEVFLOW_OPERATOR_PASSWORD:-devflow2024}
      - DB_URL=${DB_URL:-jdbc:mysql://mysql:3306/devflow_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false}
      - DB_USERNAME=${DB_USERNAME:-devflow}
      - DB_PASSWORD=${DB_PASSWORD:-devflow123}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-devflow123}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-devflow}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-devflow123}
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  pgvector_data:
